function makeCards(seed) {
  return seed.map((w, i) => ({
    key: "c" + i + "_" + Date.now() + Math.random().toString(36).slice(2, 6),
    id: w.id, ko: w.ko, ex: w.ex || "", exKo: w.exKo || "",
    level: w.level || "BIPA 1",
    box: 0,
    next: 0,
  }));
}

// localStorage 에서 불러오기 (없으면 기본 단어로 시작)
const DEFAULT_SETTINGS = { dailyCap: 30, newPerDay: 10 };
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      const cards = (data.cards || makeCards(SEED)).map((c) => ({ ...c, level: c.level || "BIPA 1" }));
      return { cards, dir: data.dir || "id-ko", settings: data.settings || { ...DEFAULT_SETTINGS } };
    }
  } catch (e) { /* 첫 실행 또는 손상된 데이터 */ }
  return { cards: makeCards(SEED), dir: "id-ko", settings: { ...DEFAULT_SETTINGS } };
}

// ── 하루 학습 큐 할당 알고리즘 ──────────────────────────────────
// ① 학습 중 (box 1~3 + 기한 도래) → 전부. 오늘 안 하면 리셋 위험
// ② 새 단어 (box 0) → newPerDay 개. 뇌의 작업기억 한계 고려
// ③ 장기 복습 (box 4~5 + 기한 도래) → 남은 자리 채우기
function buildDailyQueue(cards, settings, now) {
  const { dailyCap, newPerDay } = settings;
  function sh(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }
  const learning = sh(cards.filter((c) => isDue(c, now) && c.box >= 1 && c.box <= 3));
  // 새 단어는 key 정렬로 항상 같은 순서 → 앱 재시작해도 오늘치 단어 일관성 유지
  const newPool = cards.filter((c) => c.box === 0).sort((a, b) => a.key < b.key ? -1 : 1);
  const longTerm = sh(cards.filter((c) => isDue(c, now) && c.box >= 4));

  const queue = [...learning.map((c) => c.key)];
  const taken = new Set(queue);

  // ② 새 단어
  let newCount = 0;
  for (const c of newPool) {
    if (newCount >= newPerDay) break;
    queue.push(c.key); taken.add(c.key); newCount++;
  }

  // ③ 장기 복습 — dailyCap까지 채우기 (학습중이 상한 초과해도 학습중은 전부 보여줌)
  const ltRoom = Math.max(0, dailyCap - queue.length);
  let ltCount = 0;
  for (const c of longTerm) {
    if (ltCount >= ltRoom) break;
    if (!taken.has(c.key)) { queue.push(c.key); ltCount++; }
  }

  return { keys: queue, nLearning: learning.length, nNew: newCount, nLt: ltCount };
}

function isDue(c, now) { return c.next <= now; }
function bucket(c) {
  if (c.box === 0) return "new";
  if (c.box <= 3) return "learning";
  return "mastered";
}

  if (boot.current === null) boot.current = loadState();

  const [settings, setSettings] = useState(boot.current.settings);
  const saveTimer = useRef(null);
  const applyingRemote = useRef(false);

  function applyRemote(d) {
    if (!d) return;
    applyingRemote.current = true;
    if (Array.isArray(d.cards)) setCards(d.cards.map((c) => ({ ...c, level: c.level || "BIPA 1" })));
    if (d.dir) setDir(d.dir);
    if (d.settings) setSettings((s) => ({ ...s, ...d.settings }));
  }

  // 앱 시작 시 Firestore 연결 — 로그인 없이 자동 동기화
  useEffect(() => {
    if (!FIREBASE_READY) return;
    const ref = deckRef();
    ref.get().then((snap) => {
      if (snap.exists) applyRemote(snap.data());
      else ref.set({ cards, dir, settings, updatedAt: Date.now() }).catch(() => {});
      ref.onSnapshot((doc) => {
        if (doc.metadata.hasPendingWrites) return;
        applyRemote(doc.data());
      }, () => {});
    }).catch(() => {});
  }, []);

  // 변경 시 저장: 로컬 + 클라우드 자동
  useEffect(() => {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try { localStorage.setItem(STORE_KEY, JSON.stringify({ cards, dir, settings })); } catch (e) {}
      if (FIREBASE_READY && !applyingRemote.current) {
        deckRef().set({ cards, dir, settings, updatedAt: Date.now() }).catch(() => {});

      applyingRemote.current = false;
    }, 400);

  const scoped = levelFilter === "전체" ? cards : cards.filter((c) => c.level === levelFilter);

  const stats = {
    new: scoped.filter((c) => bucket(c) === "new").length,
    learning: scoped.filter((c) => bucket(c) === "learning").length,
    mastered: scoped.filter((c) => bucket(c) === "mastered").length,
    total: scoped.length,
    alloc, // 오늘 할당량 정보
  };

    backgroundSize: "22px 22px",
  };

  return (

        .fr { font-family:'Fraunces','Noto Sans KR',serif; }
        .pressable { transition: transform .12s ease, box-shadow .12s ease; }

        {view === "study" && (
          <Study cards={scoped} setCards={setCards} dir={dir} back={() => setView("home")} initialQueue={alloc.keys} />
        )}
        {view === "quiz" && (
          <Quiz cards={scoped} setCards={setCards} dir={dir} back={() => setView("home")} />
        )}
        {view === "manage" && (
          <Manage cards={cards} setCards={setCards} back={() => setView("home")} />
        )}

    </div>
  );
}

function Study({ cards, setCards, dir, back, initialQueue }) {
  const now = Date.now();
  const [queue, setQueue] = useState(() => initialQueue || []);
  const [revealed, setRevealed] = useState(false);
  const [done, setDone] = useState(0);

  if (queue.length === 0) {
    return <DoneScreen count={done} back={back} />;
  }

  const card = cards.find((c) => c.key === queue[0]);
  const front = dir === "id-ko" ? card.id : card.ko;
  const backTxt = dir === "id-ko" ? card.ko : card.id;
  const frontLabel = dir === "id-ko" ? "인도네시아어" : "뜻";

  function rate(kind) {
    const t = Date.now();
    let again = false;
    setCards((prev) => prev.map((c) => {
      if (c.key !== card.key) return c;
      let box = c.box;
      if (kind === "forgot") { box = 1; again = true; }
      else if (kind === "hard") { box = Math.max(1, c.box); again = true; }
      else { box = Math.min(5, (c.box || 0) + 1); }
      return { ...c, box, next: t + INTERVALS[box] * DAY };
    }));
    setQueue((q) => {
      const rest = q.slice(1);
      return again ? [...rest, card.key] : rest;
    });
    setRevealed(false);
    setDone((d) => d + 1);
  }

  const total = queue.length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontSize: 13, color: C.muted }}>남은 카드 {total}개</span>
        <span style={{ fontSize: 13, color: C.muted }}>오늘 {done}개 학습</span>
      </div>

      <div className="flip3d" style={{ marginBottom: 18 }} onClick={() => !revealed && setRevealed(true)}>
        <div className={"flipinner" + (revealed ? " flipped" : "")} style={{ height: 300 }}>
          <div className="face" style={cardFace(C.paper)}>
            <div style={{ fontSize: 12, color: C.muted, letterSpacing: 1 }}>{frontLabel}</div>
            <div className="fr" style={{ fontSize: dir === "id-ko" ? 40 : 34, fontWeight: 900, color: C.ink, textAlign: "center", padding: "0 10px" }}>
              {front}
            </div>
            <div style={{ fontSize: 13, color: C.clay, fontWeight: 600 }}>👆 떠올린 뒤 눌러서 확인</div>
          </div>
          <div className="face back" style={{ ...cardFace(C.teal), opacity: revealed ? 1 : 0, transition: "opacity .18s ease " + (revealed ? ".16s" : "0s") }}>
            <div className="fr" style={{ fontSize: 38, fontWeight: 900, color: C.cream, textAlign: "center", padding: "0 10px" }}>
              {revealed ? backTxt : ""}
            </div>
            {card.ex ? (
              <div style={{ textAlign: "center", color: "rgba(248,241,228,.85)", fontSize: 14, lineHeight: 1.5, padding: "0 14px" }}>
                <div style={{ fontStyle: "italic" }}>{revealed ? card.ex : ""}</div>
                <div style={{ fontSize: 12.5, opacity: .8, marginTop: 4 }}>{revealed ? card.exKo : ""}</div>
              </div>
            ) : <div style={{ height: 4 }} />}
          </div>
        </div>
      </div>

      {!revealed ? (
        <button onClick={() => setRevealed(true)} className="pressable"
          style={{ width: "100%", padding: 16, borderRadius: 16, border: "none", background: C.ink, color: C.cream, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
          정답 확인
        </button>
      ) : (
        <div>
          <div style={{ fontSize: 13, color: C.muted, textAlign: "center", marginBottom: 8 }}>얼마나 잘 떠올렸나요?</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <RateBtn onClick={() => rate("forgot")} bg="#fff" border={C.red} fg={C.red}>모르겠어요<small>다시 자주</small></RateBtn>
            <RateBtn onClick={() => rate("hard")} bg="#fff" border={C.gold} fg={C.clayDark}>애매해요<small>한 번 더</small></RateBtn>
            <RateBtn onClick={() => rate("easy")} bg={C.green} border={C.green} fg="#fff">알아요!<small>나중에</small></RateBtn>
          </div>
        </div>
      )}
    </div>
  );
}

function Quiz({ cards, setCards, dir, back }) {
  const [order] = useState(() => {
    const due = cards.filter((c) => isDue(c, Date.now()));
    const base = (due.length >= 4 ? due : cards).slice();
    for (let i = base.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[base[i], base[j]] = [base[j], base[i]]; }
    return base.slice(0, 10).map((c) => c.key);
  });
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);

  const card = idx < order.length ? cards.find((c) => c.key === order[idx]) : null;
  const ans = card ? (dir === "id-ko" ? card.ko : card.id) : null;
  const options = React.useMemo(() => {
    if (!card) return [];
    const others = cards.filter((c) => c.key !== card.key).map((c) => (dir === "id-ko" ? c.ko : c.id));
    const uniq = [...new Set(others)];
    for (let i = uniq.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[uniq[i], uniq[j]] = [uniq[j], uniq[i]]; }
    const opts = [ans, ...uniq.slice(0, 3)];
    for (let i = opts.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[opts[i], opts[j]] = [opts[j], opts[i]]; }
    return opts;
  }, [idx, card]);

  if (cards.length < 4) {
    return <div style={{ textAlign: "center", padding: 30, color: C.muted }}>퀴즈는 단어가 4개 이상일 때 가능해요.</div>;
  }
  if (idx >= order.length) {
    return (
      <div className="rise" style={{ textAlign: "center", padding: "40px 20px" }}>
        <div style={{ fontSize: 52 }}>{score === order.length ? "🏆" : "📘"}</div>
        <div className="fr" style={{ fontSize: 26, fontWeight: 900, color: C.teal, margin: "10px 0" }}>
          {order.length}문제 중 {score}개 정답
        </div>
        <button onClick={back} className="pressable" style={{ padding: "14px 28px", borderRadius: 16, border: "none", background: C.clay, color: "#fff", fontWeight: 700, cursor: "pointer", marginTop: 14 }}>홈으로</button>
      </div>
    );
  }

  const q = dir === "id-ko" ? card.id : card.ko;

  function choose(opt) {
    if (picked) return;
    setPicked(opt);
    const correct = opt === ans;
    if (correct) setScore((s) => s + 1);
    setCards((prev) => prev.map((c) => {
      if (c.key !== card.key) return c;
      const box = correct ? Math.min(5, (c.box || 0) + 1) : 1;
      return { ...c, box, next: Date.now() + INTERVALS[box] * DAY };
    }));
    setTimeout(() => { setPicked(null); setIdx((i) => i + 1); }, 950);
  }

  return (
    <div>
      <div style={{ fontSize: 13, color: C.muted, marginBottom: 12 }}>문제 {idx + 1} / {order.length}</div>
      <div style={{ background: C.teal, color: C.cream, borderRadius: 22, padding: "30px 18px", textAlign: "center", marginBottom: 18, boxShadow: "0 8px 24px rgba(24,92,88,.18)" }}>
        <div style={{ fontSize: 12, opacity: .7, marginBottom: 6 }}>{dir === "id-ko" ? "뜻을 고르세요" : "맞는 인도네시아어를 고르세요"}</div>
        <div className="fr" style={{ fontSize: 34, fontWeight: 900 }}>{q}</div>
      </div>
      <div style={{ display: "grid", gap: 10 }}>
        {options.map((opt) => {
          let bg = C.paper, bd = C.line, fg = C.ink;
          if (picked) {
            if (opt === ans) { bg = C.green; bd = C.green; fg = "#fff"; }
            else if (opt === picked) { bg = "#F4DAD2"; bd = C.red; fg = C.clayDark; }
          }
          return (
            <button key={opt} onClick={() => choose(opt)} className="pressable"
              style={{ padding: "16px 18px", borderRadius: 16, border: `1.5px solid ${bd}`, background: bg, color: fg, fontSize: 16, fontWeight: 600, textAlign: "left", cursor: "pointer" }}>
              {opt}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function Manage({ cards, setCards, back }) {
  const [tab, setTab] = useState("one");
  const [id, setId] = useState("");
  const [ko, setKo] = useState("");
  const [ex, setEx] = useState("");
  const [level, setLevel] = useState("미지정");
  const [bulk, setBulk] = useState("");
  const [bulkLevel, setBulkLevel] = useState("미지정");
  const [bulkMsg, setBulkMsg] = useState("");
  const [exportText, setExportText] = useState(null);
  const [copyMsg, setCopyMsg] = useState("");
  const levelRef = useRef(null);
  const bulkLevelRef = useRef(null);

  const existingLevels = cards.map((c) => c.level).filter((v, i, a) => v && a.indexOf(v) === i);

  function add() {
    if (!id.trim() || !ko.trim()) return;
    const card = {
      key: "u" + Date.now() + Math.random().toString(36).slice(2, 6),
      id: id.trim(), ko: ko.trim(), ex: ex.trim(), exKo: "",
      level: level.trim() || "미지정", box: 0, next: 0,
    };
    setCards((prev) => [card, ...prev]);
    setId(""); setKo(""); setEx("");
  }
  function remove(key) { setCards((prev) => prev.filter((c) => c.key !== key)); }
  function changeLevel(key, newLevel) {
    setCards((prev) => prev.map((c) => (c.key === key ? { ...c, level: newLevel } : c)));
  }

  function addBulk() {
    const lines = bulk.split("\n").map((l) => l.trim()).filter(Boolean);
    const newCards = [];
    let skipped = 0;
    const lv = bulkLevel.trim() || "미지정";
    for (const line of lines) {
      const parts = line.split(/\t|,|;/).map((p) => p.trim());
      const [w, meaning, example] = parts;
      if (!w || !meaning) { skipped++; continue; }
      newCards.push({
        key: "u" + Date.now() + Math.random().toString(36).slice(2, 7),
        id: w, ko: meaning, ex: example || "", exKo: "", level: lv, box: 0, next: 0,
      });
    }
    if (newCards.length === 0) {
      setBulkMsg("등록할 단어를 찾지 못했어요. ‘인니어, 뜻’ 형식인지 확인해 주세요.");
      return;
    }
    setCards((prev) => [...newCards, ...prev]);
    setBulk("");
    setBulkMsg(`${lv}에 ${newCards.length}개 추가 완료!${skipped ? ` (형식이 안 맞는 ${skipped}줄은 건너뜀)` : ""}`);
  }

  function reset() {
    if (confirm("모든 단어의 학습 진도를 초기화할까요? (단어는 그대로 남습니다)")) {
      setCards((prev) => prev.map((c) => ({ ...c, box: 0, next: 0 })));
    }
  }

  function doExport() {
    const byLevel = {};
    for (const c of cards) { (byLevel[c.level] = byLevel[c.level] || []).push(c); }
    let out = "";
    for (const lv of Object.keys(byLevel)) {
      out += `[${lv}]\n`;
      for (const c of byLevel[lv]) out += `${c.id}, ${c.ko}${c.ex ? `, ${c.ex}` : ""}\n`;
      out += "\n";
    }
    setExportText(out.trim());
    setCopyMsg("");
  }
  async function copyExport() {
    try {
      await navigator.clipboard.writeText(exportText);
      setCopyMsg("복사됐어요!");
    } catch (e) {
      setCopyMsg("아래 글을 길게 눌러 직접 복사해 주세요.");
    }
  }

  const input = { width: "100%", padding: "12px 14px", borderRadius: 12, border: `1px solid ${C.line}`, background: C.paper, fontSize: 15, color: C.ink, marginBottom: 8, fontFamily: "inherit" };

  const LevelChips = ({ value, onPick, inputRef }) => {
    const opts = ["미지정", ...existingLevels.filter((l) => l && l !== "미지정")];
    return (
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
        {opts.map((lv) => (
          <button key={lv} onClick={() => onPick(lv)} className="pressable"
            style={{ padding: "5px 11px", borderRadius: 999, fontSize: 12, cursor: "pointer",
              border: `1px solid ${value === lv ? C.teal : C.line}`,
              background: value === lv ? C.teal : "transparent", color: value === lv ? "#fff" : C.muted }}>
            {lv}
          </button>
        ))}
        <button onClick={() => { onPick(""); setTimeout(() => inputRef?.current?.focus(), 0); }} className="pressable"
          style={{ padding: "5px 11px", borderRadius: 999, fontSize: 12, cursor: "pointer",
            border: `1px dashed ${C.clay}`, background: "transparent", color: C.clay, fontWeight: 600 }}>
          + 새 카테고리
        </button>
      </div>
    );
  };

  const grouped = {};
  for (const c of cards) { (grouped[c.level] = grouped[c.level] || []).push(c); }
  const allLevelNames = Object.keys(grouped);

  return (
    <div>
      <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 18, padding: 16, marginBottom: 18 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Toggle active={tab === "one"} onClick={() => { setTab("one"); setBulkMsg(""); }}>한 개씩 추가</Toggle>
          <Toggle active={tab === "bulk"} onClick={() => { setTab("bulk"); setBulkMsg(""); }}>여러 개 한꺼번에</Toggle>
        </div>

        {tab === "one" ? (
          <>
            <input style={input} placeholder="인도네시아어 (예: terima kasih)" value={id} onChange={(e) => setId(e.target.value)} />
            <input style={input} placeholder="뜻 (예: 감사합니다)" value={ko} onChange={(e) => setKo(e.target.value)} />
            <input style={input} placeholder="예문 (선택)" value={ex} onChange={(e) => setEx(e.target.value)} />
            <div style={{ fontSize: 12, color: C.muted, margin: "2px 0 6px" }}>레벨 · 카테고리 <span style={{ opacity: .7 }}>(직접 입력하면 새로 만들어져요)</span></div>
            <LevelChips value={level} onPick={setLevel} inputRef={levelRef} />
            <input ref={levelRef} style={input} placeholder="예: BIPA 1 / 미지정 / 음식" value={level} onChange={(e) => setLevel(e.target.value)} />
            <button onClick={add} className="pressable"
              style={{ width: "100%", padding: 13, borderRadius: 12, border: "none", background: C.clay, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
              추가하기
            </button>
          </>
        ) : (
          <>
            <div style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6, marginBottom: 8 }}>
              한 줄에 한 단어씩 붙여넣으세요. <b style={{ color: C.ink }}>인니어, 뜻</b> 순서이며 쉼표(,)·탭·세미콜론(;) 어느 것으로 구분해도 됩니다. 엑셀·한글에서 두 열을 복사해 붙여도 돼요. 아래에서 고른 레벨로 한꺼번에 등록됩니다.
            </div>
            <textarea value={bulk} onChange={(e) => setBulk(e.target.value)} rows={7}
              placeholder={"makan, 먹다\nminum, 마시다\nbesar, 크다, Rumah ini besar."}
              style={{ ...input, resize: "vertical", lineHeight: 1.5, marginBottom: 8 }} />
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>이 묶음의 레벨 · 카테고리 <span style={{ opacity: .7 }}>(직접 입력하면 새로 만들어져요)</span></div>
            <LevelChips value={bulkLevel} onPick={setBulkLevel} inputRef={bulkLevelRef} />
            <input ref={bulkLevelRef} style={input} placeholder="예: BIPA 2 / 미지정 / 여행" value={bulkLevel} onChange={(e) => setBulkLevel(e.target.value)} />
            {bulkMsg && <div style={{ fontSize: 12.5, color: bulkMsg.includes("완료") ? C.green : C.clay, marginBottom: 8, fontWeight: 600 }}>{bulkMsg}</div>}
            <button onClick={addBulk} className="pressable"
              style={{ width: "100%", padding: 13, borderRadius: 12, border: "none", background: C.clay, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
              한꺼번에 등록하기
            </button>
          </>
        )}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 13, color: C.muted }}>전체 {cards.length}개 · {allLevelNames.length}개 레벨</div>
        <div style={{ display: "flex", gap: 14 }}>
          <button onClick={doExport} style={{ fontSize: 12.5, color: C.teal, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>내보내기</button>
          <button onClick={reset} style={{ fontSize: 12.5, color: C.clay, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>진도 초기화</button>
        </div>
      </div>

      {exportText !== null && (
        <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 16, padding: 14, marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>단어 목록 내보내기</div>
            <button onClick={() => setExportText(null)} style={{ background: "none", border: "none", color: C.muted, fontSize: 16, cursor: "pointer" }}>✕</button>
          </div>
          <textarea readOnly value={exportText} rows={8} onFocus={(e) => e.target.select()}
            style={{ ...input, marginBottom: 8, fontSize: 13, lineHeight: 1.5, fontFamily: "monospace" }} />
          <button onClick={copyExport} className="pressable"
            style={{ width: "100%", padding: 11, borderRadius: 10, border: `1px solid ${C.teal}`, background: C.teal, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
            복사하기
          </button>
          {copyMsg && <div style={{ fontSize: 12.5, color: C.green, marginTop: 6, textAlign: "center" }}>{copyMsg}</div>}
        </div>
      )}

      {allLevelNames.map((lv) => (
        <div key={lv} style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <div className="fr" style={{ fontWeight: 900, fontSize: 16, color: C.teal }}>{lv}</div>
            <div style={{ fontSize: 12, color: C.muted }}>{grouped[lv].length}개</div>
            <div style={{ flex: 1, height: 1, background: C.line }} />
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {grouped[lv].map((c) => (
              <div key={c.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.paper, border: `1px solid ${C.line}`, borderRadius: 14, padding: "11px 14px" }}>
                <div style={{ minWidth: 0 }}>
                  <div className="fr" style={{ fontWeight: 700, fontSize: 16 }}>{c.id}</div>
                  <div style={{ fontSize: 13, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.ko}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                  {allLevelNames.length > 1 && (
                    <select value={c.level} onChange={(e) => changeLevel(c.key, e.target.value)}
                      style={{ fontSize: 11, color: C.muted, border: `1px solid ${C.line}`, borderRadius: 8, padding: "3px 4px", background: C.cream, fontFamily: "inherit" }}>
                      {[...new Set([...allLevelNames, "미지정"])].map((n) => <option key={n} value={n}>{n}</option>)}
                    </select>
                  )}
                  <BoxPip box={c.box} />
                  <button onClick={() => remove(c.key)} style={{ background: "none", border: "none", color: C.muted, fontSize: 18, cursor: "pointer", padding: 4 }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function BoxPip({ box }) {
  const colors = [C.line, "#E6B9A8", C.gold, "#9CC0A8", C.green, C.teal];
  return (
    <div style={{ display: "flex", gap: 3 }} title={"단계 " + box + "/5"}>
      {[1, 2, 3, 4, 5].map((n) => (
        <div key={n} style={{ width: 7, height: 7, borderRadius: 99, background: n <= box ? colors[box] : C.line }} />
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
